---
layout: default
title: Blog
---

<div class="posts">
  {% for post in site.posts %}
  <div class="post">
    <h1 class="post-title">
      <a href="{{ post.url | relative_url }}">
        {{ post.title }}
      </a>
    </h1>
    <span class="post-date">{{ post.date | date: "%B %-d, %Y" }}</span>
    {{ post.content }}
  </div>
  {% endfor %}
</div>
