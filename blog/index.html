---
layout: default
title: Blog
---

<div class="posts">
  {% for post in site.posts %}

  <section class="post-entry">
    <h2 class="post-title">
      <a href="{{ post.url | relative_url }}">
        {{ post.title }}
      </a>
    </h2>

    <div class="post-meta">
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date_to_string }}</time>
    </div>

    <p>{{ post.excerpt | strip_html }}</p>
  </section>
  {% endfor %}
</div>
